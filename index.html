<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bordspel">
<meta name="theme-color" content="#0b1220">
<meta name="mobile-web-app-capable" content="yes">
<title>Bordspel — kies een spel</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }

  :root {
    --bg: #0b1220;
    --bg-2: #111a2e;
    --panel: #131e3a;
    --border: #1f2a48;
    --text: #e5e7eb;
    --muted: #94a3b8;
    --accent: #4ade80;
    --pad: clamp(12px, 3vw, 20px);
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
    --safe-left: env(safe-area-inset-left, 0px);
    --safe-right: env(safe-area-inset-right, 0px);
  }

  html, body {
    margin: 0; padding: 0; min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
    overscroll-behavior: none;
    touch-action: manipulation;
  }
  body {
    min-height: 100dvh;
    background:
      radial-gradient(circle at 20% 0%, rgba(74,222,128,0.08), transparent 40%),
      radial-gradient(circle at 80% 100%, rgba(99,102,241,0.10), transparent 50%),
      radial-gradient(ellipse at top, #1a2547 0%, var(--bg) 60%),
      var(--bg);
    display: flex;
    justify-content: center;
  }

  .app {
    width: 100%;
    max-width: 560px;
    min-height: 100dvh;
    padding:
      calc(var(--pad) + var(--safe-top))
      calc(var(--pad) + var(--safe-right))
      calc(var(--pad) + var(--safe-bot))
      calc(var(--pad) + var(--safe-left));
    display: flex;
    flex-direction: column;
    gap: var(--pad);
  }

  header {
    text-align: center;
    padding: 8px 0 4px;
  }
  h1 {
    margin: 0;
    font-size: clamp(1.6rem, 7vw, 2.4rem);
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #ffffff, #94a3b8);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .tagline {
    margin: 6px 0 0;
    color: var(--muted);
    font-size: 0.95rem;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .card {
    position: relative;
    aspect-ratio: 1 / 1;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    text-decoration: none;
    color: var(--text);
    overflow: hidden;
    transition: transform 0.12s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    cursor: pointer;
    min-height: 44px;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--card-bg);
    opacity: 0.18;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }
  .card:active {
    transform: scale(0.97);
  }
  .card:active::before { opacity: 0.32; }
  .card:hover { border-color: var(--card-accent); }

  .card .preview {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 8px;
    pointer-events: none;
    position: relative;
  }
  .card .meta {
    position: relative;
    z-index: 1;
  }
  .card .name {
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: 0.2px;
  }
  .card .desc {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 2px;
    line-height: 1.3;
  }

  .card.bke {
    --card-accent: #f472b6;
    --card-bg: radial-gradient(circle at 70% 30%, rgba(244,114,182,0.5), transparent 60%);
  }
  .card.snake {
    --card-accent: #4ade80;
    --card-bg: radial-gradient(circle at 30% 70%, rgba(74,222,128,0.45), transparent 60%);
  }
  .card.connect4 {
    --card-accent: #facc15;
    --card-bg: radial-gradient(circle at 50% 30%, rgba(250,204,21,0.4), transparent 60%);
  }
  .card.paint {
    --card-accent: #a855f7;
    --card-bg: linear-gradient(135deg, rgba(239,68,68,0.25), rgba(168,85,247,0.25), rgba(56,189,248,0.25));
  }

  .icon {
    width: 64px;
    height: 64px;
    display: block;
  }

  footer {
    text-align: center;
    color: var(--muted);
    font-size: 0.72rem;
    opacity: 0.7;
    margin-top: auto;
    padding-top: 12px;
  }
  footer .tip {
    margin-top: 4px;
  }
</style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Bordspel</h1>
      <p class="tagline">Kies een spel om te beginnen</p>
    </header>

    <div class="grid">
      <a class="card bke" href="games/boter-kaas-eieren/" aria-label="Boter, Kaas en Eieren">
        <div class="preview">
          <svg class="icon" viewBox="0 0 64 64" aria-hidden="true">
            <g stroke="#cbd5e1" stroke-width="2" stroke-linecap="round">
              <line x1="22" y1="8" x2="22" y2="56"/>
              <line x1="42" y1="8" x2="42" y2="56"/>
              <line x1="8" y1="22" x2="56" y2="22"/>
              <line x1="8" y1="42" x2="56" y2="42"/>
            </g>
            <g fill="none" stroke="#f472b6" stroke-width="3.5" stroke-linecap="round">
              <line x1="11" y1="11" x2="19" y2="19"/>
              <line x1="19" y1="11" x2="11" y2="19"/>
              <line x1="45" y1="45" x2="53" y2="53"/>
              <line x1="53" y1="45" x2="45" y2="53"/>
            </g>
            <circle cx="32" cy="32" r="5" fill="none" stroke="#38bdf8" stroke-width="3.5"/>
            <circle cx="48" cy="14" r="5" fill="none" stroke="#38bdf8" stroke-width="3.5"/>
          </svg>
        </div>
        <div class="meta">
          <div class="name">Boter, Kaas &amp; Eieren</div>
          <div class="desc">Drie op een rij</div>
        </div>
      </a>

      <a class="card snake" href="games/snake/" aria-label="Snake">
        <div class="preview">
          <svg class="icon" viewBox="0 0 64 64" aria-hidden="true">
            <path d="M10 18 H30 a6 6 0 0 1 6 6 v8 a6 6 0 0 0 6 6 H54"
                  fill="none" stroke="#4ade80" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="51" cy="38" r="2.2" fill="#062012"/>
            <circle cx="55" cy="38" r="2.2" fill="#062012"/>
            <circle cx="14" cy="50" r="4.5" fill="#ef4444"/>
          </svg>
        </div>
        <div class="meta">
          <div class="name">Snake</div>
          <div class="desc">Eet appels, blijf groeien</div>
        </div>
      </a>

      <a class="card connect4" href="games/vier-op-een-rij/" aria-label="Vier op een rij">
        <div class="preview">
          <svg class="icon" viewBox="0 0 64 64" aria-hidden="true">
            <rect x="6" y="10" width="52" height="44" rx="5" fill="#1e3a8a"/>
            <g fill="#0b1220">
              <circle cx="16" cy="20" r="4"/><circle cx="28" cy="20" r="4"/>
              <circle cx="40" cy="20" r="4"/><circle cx="52" cy="20" r="4"/>
              <circle cx="16" cy="32" r="4"/><circle cx="28" cy="32" r="4"/>
              <circle cx="40" cy="32" r="4"/><circle cx="52" cy="32" r="4"/>
              <circle cx="16" cy="44" r="4"/><circle cx="28" cy="44" r="4"/>
              <circle cx="40" cy="44" r="4"/><circle cx="52" cy="44" r="4"/>
            </g>
            <circle cx="28" cy="44" r="4" fill="#ef4444"/>
            <circle cx="40" cy="44" r="4" fill="#facc15"/>
            <circle cx="40" cy="32" r="4" fill="#ef4444"/>
            <circle cx="52" cy="44" r="4" fill="#facc15"/>
          </svg>
        </div>
        <div class="meta">
          <div class="name">Vier op een rij</div>
          <div class="desc">Verbind er vier</div>
        </div>
      </a>

      <a class="card paint" href="games/paint/" aria-label="Paint">
        <div class="preview">
          <svg class="icon" viewBox="0 0 64 64" aria-hidden="true">
            <path d="M10 50 L10 42 L40 12 L52 24 L22 54 L14 54 Z"
                  fill="#a855f7" stroke="#1f2a48" stroke-width="2" stroke-linejoin="round"/>
            <path d="M40 12 L52 24" stroke="#1f2a48" stroke-width="2"/>
            <path d="M36 16 L48 28" stroke="#1f2a48" stroke-width="2"/>
            <circle cx="14" cy="14" r="4" fill="#ef4444"/>
            <circle cx="26" cy="10" r="3" fill="#facc15"/>
            <circle cx="56" cy="38" r="3.5" fill="#22d3ee"/>
            <circle cx="50" cy="50" r="3" fill="#4ade80"/>
          </svg>
        </div>
        <div class="meta">
          <div class="name">Paint</div>
          <div class="desc">Teken met je vinger</div>
        </div>
      </a>
    </div>

    <footer>
      <div>4 spellen, geen reclame, geen gedoe</div>
      <div class="tip">Tip: deelicoon in Safari → "Zet op beginscherm" voor fullscreen</div>
    </footer>
  </div>

<script>
  document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => {
      if (navigator.vibrate) try { navigator.vibrate(10); } catch (e) {}
    });
  });
</script>
</body>
</html>
